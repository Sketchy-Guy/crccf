services:
  - type: web
    name: resume-builder-api
    env: python
    rootDir: resume_builder
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn resume_builder.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: False
      - key: DB_ENGINE
        value: sqlite
      - key: DB_NAME
        value: db.sqlite3
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://resume-builder-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://resume-builder-frontend.onrender.com
  - type: web
    name: resume-builder-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://resume-builder-api.onrender.com/api

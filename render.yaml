services:
  - type: web
    name: resume-builder-api
    runtime: python
    plan: free
    rootDir: resume_builder
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn resume_builder.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: sqlite
      - key: DB_NAME
        value: db.sqlite3
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: USE_MOCK_EMAIL
        value: "True"
      - key: USE_MOCK_WHATSAPP
        value: "True"
